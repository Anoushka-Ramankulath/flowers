<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Blooming Lilies</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

  :root {
    --bg: #0a0c0f;
    --stem: #2d4a2a;
    --petal-1: #f2c4c4;
    --petal-2: #e8889e;
    --petal-3: #d45e7a;
    --petal-accent: #f9e0e8;
    --stamen: #f5d76e;
    --stamen-tip: #e8a020;
    --leaf: #2e5c2a;
    --leaf-light: #4a8c44;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 100%; height: 100%; }

  body {
    background: var(--bg);
    min-height: 100svh;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  .bg-glow {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 45% at 50% 100%, rgba(180,80,100,0.14) 0%, transparent 70%),
      radial-gradient(ellipse 45% 35% at 25% 85%,  rgba(80,120,60,0.09) 0%, transparent 60%),
      radial-gradient(ellipse 45% 35% at 75% 85%,  rgba(80,120,60,0.09) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .title {
    position: fixed;
    top: clamp(16px, 4vw, 48px);
    left: 50%;
    transform: translateX(-50%);
    color: rgba(242,196,196,0.55);
    font-size: clamp(0.7rem, 2.2vw, 1.15rem);
    font-weight: 300; font-style: italic;
    letter-spacing: 0.35em; text-transform: lowercase; white-space: nowrap;
    animation: titleFade 3s ease forwards; z-index: 10;
    text-align: center;
  }
  @keyframes titleFade {
    from { opacity:0; transform: translateX(-50%) translateY(8px); }
    to   { opacity:1; transform: translateX(-50%) translateY(0); }
  }

  /*
   * CENTERING STRATEGY
   * ------------------
   * The design canvas is 700×580. We scale it with CSS transform.
   * .scene-wrapper is fixed to the bottom of the viewport, full width.
   * .scene sits inside it at position absolute, centred with left:50%.
   * transform-origin is bottom center.
   * JS applies: transform = translateX(-50%) scale(S)
   *   — translateX(-50%) shifts left by 50% of the UNSCALED 700px = 350px,
   *     perfectly centring it before scale is applied.
   *   — scale(S) then zooms in/out around the bottom-centre point.
   * The wrapper height is set to scaledH so it doesn't collapse.
   */
  .scene-wrapper {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;          /* always full viewport width */
    z-index: 1;
    /* height set by JS */
  }

  .scene {
    position: absolute;
    bottom: 0;
    left: 50%;            /* anchor horizontally to viewport centre */
    transform-origin: bottom center;
    /* JS sets: transform: translateX(-50%) scale(S) */
    width: 700px;
    height: 580px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  /* ── Ground ── */
  .ground {
    position: absolute; bottom: 0; left: -100px; right: -100px; height: 60px;
    background: linear-gradient(to top, rgba(20,30,25,0.9), transparent);
    border-radius: 50% 50% 0 0 / 20px 20px 0 0;
  }

  /* ── Mist ── */
  .mist-layer {
    position: absolute; bottom: 30px; left: -50px; right: -50px; height: 80px;
    background: radial-gradient(ellipse 80% 100% at 50% 100%, rgba(255,220,230,0.06) 0%, transparent 70%);
    animation: mistDrift 8s ease-in-out infinite alternate;
  }
  @keyframes mistDrift {
    from { opacity:.4; transform: scaleX(.95); }
    to   { opacity:1;  transform: scaleX(1.05); }
  }

  /* ── Lily ── */
  .lily { position: relative; display: flex; align-items: flex-end; justify-content: center; }
  .lily-1 { animation: plantRise 1.2s cubic-bezier(.2,.8,.4,1) both; }
  .lily-2 { animation: plantRise 1.5s cubic-bezier(.2,.8,.4,1) .3s both; }
  .lily-3 { animation: plantRise 1.2s cubic-bezier(.2,.8,.4,1) .6s both; }
  @keyframes plantRise {
    from { opacity:0; transform: translateY(40px) scaleY(.6); }
    to   { opacity:1; transform: translateY(0) scaleY(1); }
  }

  .lily svg { overflow: visible; filter: drop-shadow(0 8px 24px rgba(200,80,100,.18)); }

  .stem-path { stroke: var(--stem); stroke-width: 3.5; fill: none; stroke-linecap: round; }

  .leaf-shape       { fill: var(--leaf);       transform-origin: bottom center; animation: leafSway 6s ease-in-out infinite; }
  .leaf-shape.right { animation-direction: alternate-reverse; }
  .leaf-shape-light { fill: var(--leaf-light); opacity: .4; }
  @keyframes leafSway {
    0%,100% { transform: rotate(-2deg); }
    50%     { transform: rotate(3deg); }
  }

  .petal { transform-origin: 50% 100%; animation: bloomPetal 1.8s cubic-bezier(.2,.9,.4,1) both; }
  .p1{animation-delay:1.0s} .p2{animation-delay:1.15s} .p3{animation-delay:1.3s}
  .p4{animation-delay:1.15s} .p5{animation-delay:1.0s} .p6{animation-delay:1.3s}
  @keyframes bloomPetal {
    from { transform: scaleY(.05) scaleX(.3); opacity:0; }
    60%  { opacity:1; }
    to   { transform: scaleY(1) scaleX(1); opacity:1; }
  }
  .lily-2 .p1{animation-delay:1.3s}  .lily-2 .p2{animation-delay:1.45s} .lily-2 .p3{animation-delay:1.6s}
  .lily-2 .p4{animation-delay:1.45s} .lily-2 .p5{animation-delay:1.3s}  .lily-2 .p6{animation-delay:1.6s}
  .lily-3 .p1{animation-delay:1.6s}  .lily-3 .p2{animation-delay:1.75s} .lily-3 .p3{animation-delay:1.9s}
  .lily-3 .p4{animation-delay:1.75s} .lily-3 .p5{animation-delay:1.6s}  .lily-3 .p6{animation-delay:1.9s}

  .petal-outer { fill: var(--petal-2); }
  .petal-inner { fill: var(--petal-1); opacity: .7; }
  .petal-vein  { stroke: var(--petal-3); stroke-width: .8; fill: none; opacity: .5; }
  .petal-glow  { fill: var(--petal-accent); opacity: .25; }

  .stamen-group { transform-origin: 50% 100%; animation: stamenRise .8s cubic-bezier(.3,1,.5,1) 2.4s both; }
  .lily-2 .stamen-group { animation-delay: 2.7s; }
  .lily-3 .stamen-group { animation-delay: 3.0s; }
  @keyframes stamenRise {
    from { transform: scaleY(0); opacity:0; }
    to   { transform: scaleY(1); opacity:1; }
  }
  .stamen-line { stroke: var(--stamen); stroke-width: 1.2; fill: none; }
  .stamen-dot  { fill: var(--stamen-tip); }

  .bud-petal     { fill: var(--petal-2); transform-origin: 50% 100%; animation: budSway 7s ease-in-out infinite; }
  .bud-petal.alt { animation-direction: alternate-reverse; }
  @keyframes budSway {
    0%,100% { transform: rotate(-1.5deg); }
    50%     { transform: rotate(1.5deg); }
  }

  .pollen { position:absolute; border-radius:50%; background:var(--stamen); opacity:0; animation:pollenFloat linear infinite; }
  @keyframes pollenFloat {
    0%   { opacity:0;  transform:translate(0,0) scale(1); }
    10%  { opacity:.8; }
    90%  { opacity:.4; }
    100% { opacity:0;  transform:translate(var(--dx),var(--dy)) scale(.3); }
  }

  .lily-1 svg { animation: gentleSway  9s ease-in-out 0s infinite;         transform-origin: bottom center; }
  .lily-2 svg { animation: gentleSway 11s ease-in-out 1s infinite reverse; transform-origin: bottom center; }
  .lily-3 svg { animation: gentleSway  8s ease-in-out 2s infinite;         transform-origin: bottom center; }
  @keyframes gentleSway {
    0%,100% { transform: rotate(-1deg); }
    50%     { transform: rotate(1.2deg); }
  }

  .firefly {
    position: fixed; width:3px; height:3px; border-radius:50%;
    background: rgba(255,240,180,.9);
    box-shadow: 0 0 6px 2px rgba(255,230,120,.5);
    animation: fireflyAnim linear infinite;
    z-index:5; pointer-events:none;
  }
  @keyframes fireflyAnim {
    0%   { opacity:0; transform:translate(0,0); }
    20%  { opacity:1; }
    80%  { opacity:.8; }
    100% { opacity:0; transform:translate(var(--ffx),var(--ffy)); }
  }

  @media (max-height:500px) and (orientation:landscape) {
    .title { top:8px; font-size:.65rem; }
  }
</style>
</head>

<script>
  const DESIGN_W = 700, DESIGN_H = 580;
  const wrapper = document.querySelector('.scene-wrapper');
  const scene   = document.querySelector('.scene');

  function fitScene() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const availH = vh - Math.max(50, vh * 0.1);

    let scale = Math.min(vw / DESIGN_W, availH / DESIGN_H);
    scale = Math.min(scale, 1); // never upscale on large screens

    const scaledH = Math.round(DESIGN_H * scale);

    // Wrapper height keeps the fixed-positioned element from collapsing
    wrapper.style.height = scaledH + 'px';

    // translateX(-50%) centres the 700px canvas on the left:50% anchor point.
    // scale() then zooms it uniformly from the bottom-centre.
    scene.style.transform = `translateX(-50%) scale(${scale})`;
  }

  fitScene();
  window.addEventListener('resize', fitScene);
